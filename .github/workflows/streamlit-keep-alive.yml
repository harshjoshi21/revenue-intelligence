name: Streamlit Keep Alive

on:
  schedule:
    # Every 15 minutes (UTC)
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping-app:
    runs-on: ubuntu-latest
    env:
      APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
    steps:
      - name: Validate keep-alive configuration
        run: |
          if [ -z "$APP_URL" ]; then
            echo "STREAMLIT_APP_URL secret is not set."
            exit 1
          fi

          CLEAN_APP_URL="$(echo "$APP_URL" | tr -d '[:space:]')"
          if [ -z "$CLEAN_APP_URL" ]; then
            echo "STREAMLIT_APP_URL is empty after trimming whitespace."
            exit 1
          fi

      - name: Ping Streamlit app URL
        run: |
          CLEAN_APP_URL="$(echo "$APP_URL" | tr -d '[:space:]')"
          HEALTH_URL="${CLEAN_APP_URL%/}/_stcore/health"
          ROOT_URL="${CLEAN_APP_URL%/}/"

          echo "Probing health endpoint (no redirect follow): $HEALTH_URL"
          HEALTH_STATUS=$(curl --silent --show-error --max-time 30 \
            --retry 3 --retry-delay 5 --retry-connrefused \
            --user-agent "github-actions-streamlit-keepalive" \
            --output /dev/null --write-out "%{http_code}" \
            "$HEALTH_URL")

          echo "Health probe status: $HEALTH_STATUS"
          if [ "$HEALTH_STATUS" -lt 200 ] || [ "$HEALTH_STATUS" -ge 400 ]; then
            echo "Health probe failed for $HEALTH_URL with status $HEALTH_STATUS"
            exit 1
          fi

          echo "Warming root URL: $ROOT_URL"
          ROOT_STATUS=$(curl --silent --show-error --max-time 45 \
            --retry 3 --retry-delay 5 --retry-connrefused \
            --location --max-redirs 5 \
            --user-agent "github-actions-streamlit-keepalive" \
            --output /dev/null --write-out "%{http_code}" \
            "$ROOT_URL")

          echo "Root warm status: $ROOT_STATUS"
          if [ "$ROOT_STATUS" -lt 200 ] || [ "$ROOT_STATUS" -ge 400 ]; then
            echo "Root warm-up failed for $ROOT_URL with status $ROOT_STATUS"
            exit 1
          fi

          echo "Ping completed successfully."

      - name: Health check (HTTP status)
        run: |
          CLEAN_APP_URL="$(echo "$APP_URL" | tr -d '[:space:]')"
          HEALTH_URL="${CLEAN_APP_URL%/}/_stcore/health"

          STATUS_CODE=$(curl --silent --show-error --max-time 30 \
            --retry 2 --retry-delay 3 --retry-connrefused \
            --output /dev/null --write-out "%{http_code}" \
            --user-agent "github-actions-streamlit-healthcheck" \
            "$HEALTH_URL")

          echo "Health check status: $STATUS_CODE"

          if [ "$STATUS_CODE" -lt 200 ] || [ "$STATUS_CODE" -ge 400 ]; then
            echo "Health check failed for $HEALTH_URL with status $STATUS_CODE"
            exit 1
          fi

          echo "Health check passed."
